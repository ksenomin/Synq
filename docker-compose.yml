version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: synq-postgres
    environment:
      POSTGRES_DB: synq
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5438:5432"
    networks:
      - synq-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: synq-backend
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "5000:5000"
      - "5001:5001"
    environment:
      - ASPNETCORE_URLS=http://0.0.0.0:5000
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=synq;Username=postgres;Password=postgres
    command: sh -c "dotnet restore Synq.sln && dotnet run --project src/Synq.WebApi/Synq.WebApi.csproj --no-restore"
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
    networks:
      - synq-network

  mailpit:
    image: axllent/mailpit:latest
    container_name: synq-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    environment:
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
    networks:
      - synq-network

  frontend:
    image: node:20-alpine
    container_name: synq-frontend
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
    networks:
      - synq-network

volumes:
  postgres_data:

networks:
  synq-network:
    driver: bridge
